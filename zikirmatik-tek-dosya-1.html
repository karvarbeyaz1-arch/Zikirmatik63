<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --emerald: #1a6b4a;
    --emerald-dark: #0f4530;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #fdf6e3;
    --deep: #0d2b1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans Arabic', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(26,107,74,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(13,43,30,1) 0%, transparent 100%);
    z-index: 0;
  }

  .geometric-overlay {
    position: fixed; inset: 0;
    opacity: 0.07;
    background-image:
      repeating-linear-gradient(60deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-60deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(0deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* ── Başlık ── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 22px 16px 8px;
    flex-shrink: 0;
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: clamp(1.6rem, 5.5vw, 2.4rem);
    color: var(--gold-light);
    text-shadow: 0 0 18px rgba(201,168,76,0.5);
    margin-bottom: 4px;
  }

  .app-title {
    font-size: 0.88rem;
    color: rgba(253,246,227,0.45);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ── Zikir seçici ── */
  .zikir-selector {
    position: relative; z-index: 10;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }

  .zikir-btn {
    background: rgba(26,107,74,0.25);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    font-family: 'Amiri', serif;
    font-size: 1.15rem;
    padding: 9px 18px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .zikir-btn.active {
    background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
    border-color: var(--gold);
    font-weight: 700;
    box-shadow: 0 0 12px rgba(201,168,76,0.3);
  }

  /* Seçili zikirin Türkçe anlamı */
  .zikir-info {
    position: relative; z-index: 10;
    text-align: center;
    padding: 6px 16px 4px;
    flex-shrink: 0;
  }

  .zikir-info .zikir-ar {
    font-family: 'Amiri', serif;
    font-size: clamp(1.9rem, 6vw, 2.6rem);
    color: var(--cream);
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }

  .zikir-info .zikir-meaning {
    font-size: 1.15rem;
    color: rgba(201,168,76,0.9);
    letter-spacing: 0.3px;
    margin-top: 5px;
  }

  /* ── Orta alan: buton ── */
  .center-area {
    position: relative; z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding-bottom: 20px;
    padding-top: 0;
  }

  /* ── Kırmızı buton ── */
  .main-btn {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b 55%, #7b241c);
    border: none;
    cursor: pointer;
    position: relative;
    box-shadow:
      0 0 0 7px rgba(192,57,43,0.2),
      0 0 0 14px rgba(192,57,43,0.08),
      0 12px 40px rgba(0,0,0,0.6),
      inset 0 2px 6px rgba(255,255,255,0.15),
      inset 0 -4px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .main-btn::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 28%, rgba(255,255,255,0.18) 0%, transparent 58%);
    pointer-events: none;
  }

  .main-btn:active {
    transform: scale(0.92);
    box-shadow:
      0 0 0 4px rgba(192,57,43,0.25),
      0 4px 20px rgba(0,0,0,0.5),
      inset 0 3px 10px rgba(0,0,0,0.4);
  }

  .btn-count {
    font-family: 'Amiri', serif;
    font-size: 4rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  /* ── Sıfırla ── */
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    color: rgba(201,168,76,0.6);
    font-family: 'Noto Sans Arabic', sans-serif;
    font-size: 0.75rem;
    padding: 8px 24px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .reset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  /* ── İstatistik butonu ── */
  .stats-toggle {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 100;
    background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 0.75rem;
    padding: 10px 16px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .stats-toggle:hover { transform: scale(1.05); }

  /* ── İstatistik panel ── */
  .stats-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .stats-overlay.open { opacity: 1; pointer-events: all; }

  .stats-panel {
    background: linear-gradient(180deg, #0f3d27 0%, #0a2619 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px;
    padding: 28px 24px 36px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .stats-overlay.open .stats-panel { transform: translateY(0); }

  .stats-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .stats-title { font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold-light); }
  .stats-date { font-size: 0.7rem; color: rgba(253,246,227,0.4); letter-spacing: 1px; margin-top: 2px; }

  .stats-close {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }

  .stats-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .stats-row:last-child { border-bottom: none; }
  .stats-zikir { font-family: 'Amiri', serif; font-size: 1.15rem; color: var(--cream); }
  .stats-meaning-small { font-size: 0.68rem; color: rgba(253,246,227,0.4); margin-top: 2px; }

  .stats-count-badge {
    background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    padding: 5px 16px;
    border-radius: 20px;
    min-width: 60px;
    text-align: center;
  }

  .stats-total {
    margin-top: 14px; padding: 14px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .stats-total-label { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 1px; }
  .stats-total-num { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--gold-light); }

  /* ── Hedef ── */
  .stats-row {
    flex-wrap: wrap;
  }

  .goal-area {
    width: 100%;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .goal-progress-bar {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .goal-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--emerald), var(--gold));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .goal-pct {
    font-size: 0.68rem;
    color: rgba(201,168,76,0.7);
    min-width: 34px;
    text-align: right;
  }

  .goal-edit-btn {
    background: transparent;
    border: 1px dashed rgba(201,168,76,0.3);
    color: rgba(201,168,76,0.55);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .goal-edit-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* hedef modal */
  .goal-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 400;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(3px);
  }

  .goal-modal-overlay.open { opacity: 1; pointer-events: all; }

  .goal-modal {
    background: linear-gradient(180deg, #0f3d27 0%, #0a2619 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    width: min(340px, 90vw);
    transform: scale(0.88);
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }

  .goal-modal-overlay.open .goal-modal { transform: scale(1); }

  .goal-modal-title {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    color: var(--gold-light);
    margin-bottom: 6px;
  }

  .goal-modal-zikir {
    font-size: 0.75rem;
    color: rgba(253,246,227,0.45);
    margin-bottom: 18px;
  }

  .goal-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .goal-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    color: var(--cream);
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    text-align: center;
    padding: 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .goal-input:focus { border-color: var(--gold); }

  .goal-input::placeholder { color: rgba(253,246,227,0.2); }

  .goal-modal-btns {
    display: flex; gap: 10px;
  }

  .goal-save-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 0.9rem;
    padding: 11px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Noto Sans Arabic', sans-serif;
    transition: opacity 0.2s;
  }

  .goal-save-btn:hover { opacity: 0.85; }

  .goal-cancel-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.2);
    color: rgba(253,246,227,0.45);
    font-size: 0.9rem;
    padding: 11px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Noto Sans Arabic', sans-serif;
    transition: all 0.2s;
  }

  .goal-cancel-btn:hover { border-color: rgba(201,168,76,0.4); color: var(--cream); }

  .goal-clear-btn {
    background: transparent;
    border: 1px solid rgba(192,57,43,0.3);
    color: rgba(231,76,60,0.6);
    font-size: 0.75rem;
    padding: 5px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    font-family: 'Noto Sans Arabic', sans-serif;
    transition: all 0.2s;
  }

  .goal-clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }

  /* ── MAŞALLAH ── */
  .masallah-overlay {
    position: fixed; inset: 0;
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }

  .masallah-overlay.boom { animation: masallah-anim 1.9s ease forwards; }

  @keyframes masallah-anim {
    0%   { opacity: 0; transform: scale(0.3); }
    15%  { opacity: 1; transform: scale(1.15); }
    30%  { transform: scale(0.95); }
    45%  { transform: scale(1.08); }
    65%  { opacity: 1; transform: scale(1); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.2); }
  }

  .masallah-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(201,168,76,0.22) 0%, transparent 70%);
  }

  .masallah-text {
    position: relative;
    font-family: 'Amiri', serif;
    font-size: clamp(3rem, 15vw, 7rem);
    font-weight: 700;
    color: var(--gold-light);
    text-align: center;
    text-shadow: 0 0 30px rgba(201,168,76,0.9), 0 0 60px rgba(201,168,76,0.6), 2px 4px 0 rgba(0,0,0,0.5);
    line-height: 1.2;
    padding: 0 20px;
  }

  .masallah-stars { position: absolute; inset: 0; pointer-events: none; }

  .star {
    position: absolute;
    width: 9px; height: 9px;
    background: var(--gold-light);
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation: star-fly 1.9s ease forwards;
  }

  @keyframes star-fly {
    0%   { opacity: 0; transform: scale(0) rotate(0deg); }
    25%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.5) rotate(720deg) translate(var(--dx), var(--dy)); }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="geometric-overlay"></div>

<header>
  <div class="bismillah">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ</div>
  <div class="app-title">Zikirmatik</div>
</header>

<div class="zikir-selector" id="zikirSelector"></div>

<div class="zikir-info">
  <div class="zikir-ar" id="zikirAr"></div>
  <div class="zikir-meaning" id="zikirMeaning"></div>
</div>

<div class="center-area">
  <button class="main-btn" id="mainBtn" onclick="doZikir()">
    <span class="btn-count" id="btnCount">0</span>
  </button>
  <button class="reset-btn" onclick="resetCount()">↺ Sıfırla</button>
</div>

<button class="stats-toggle" onclick="openStats()">📊 Günlük Zikirler</button>

<div class="stats-overlay" id="statsOverlay" onclick="closeOutside(event)">
  <div class="stats-panel">
    <div class="stats-header">
      <div>
        <div class="stats-title">📿 Günlük İstatistik</div>
        <div class="stats-date" id="statsDate"></div>
      </div>
      <button class="stats-close" onclick="closeStats()">✕</button>
    </div>
    <div id="statsRows"></div>
    <div class="stats-total">
      <span class="stats-total-label">TOPLAM</span>
      <span class="stats-total-num" id="statsTotal">0</span>
    </div>
  </div>
</div>

<!-- Hedef Modal -->
<div class="goal-modal-overlay" id="goalModalOverlay" onclick="closeGoalOutside(event)">
  <div class="goal-modal">
    <div class="goal-modal-title">🎯 Günlük Hedef Belirle</div>
    <div class="goal-modal-zikir" id="goalModalZikirName"></div>
    <div class="goal-input-row">
      <input class="goal-input" type="number" id="goalInput" placeholder="100" min="1" max="99999">
    </div>
    <div class="goal-modal-btns">
      <button class="goal-cancel-btn" onclick="closeGoalModal()">İptal</button>
      <button class="goal-save-btn" onclick="saveGoal()">✓ Kaydet</button>
    </div>
    <button class="goal-clear-btn" id="goalClearBtn" onclick="clearGoal()">Hedefi Kaldır</button>
  </div>
</div>

<div class="masallah-overlay" id="masallahOverlay">
  <div class="masallah-bg"></div>
  <div class="masallah-stars" id="masallahStars"></div>
  <div class="masallah-text">مَاشَاءَ اللّٰهُ<br><span style="font-size:0.45em;color:rgba(253,246,227,0.85);">Mâşâallah!</span></div>
</div>

<script>
const ZIKIRLER = [
  { ar: 'سُبْحَانَ اللّٰهِ',         tr: 'Sübhanallah',      meaning: 'Allah\'ı her türlü noksanlıktan tenzih ederim' },
  { ar: 'اَلْحَمْدُ لِلّٰهِ',        tr: 'Elhamdülillah',    meaning: 'Hamd yalnızca Allah\'a mahsustur' },
  { ar: 'اَللّٰهُ اَكْبَرُ',         tr: 'Allahu Ekber',     meaning: 'Allah en büyüktür' },
  { ar: 'لَا اِلٰهَ اِلَّا اللّٰهُ', tr: 'Lailaheillallah', meaning: 'Allah\'tan başka ilah yoktur' },
  { ar: 'اَسْتَغْفِرُ اللّٰهَ',      tr: 'Estağfirullah',    meaning: 'Allah\'tan bağışlanma dilerim' },
];

const TODAY = new Date().toISOString().slice(0, 10);
let currentZikir = 0;
let count = 0;
let todayStats = {};
let goals = {};          // { zikirIndex: hedefSayı }
let goalEditIndex = -1;  // hangi zikir için hedef düzenleniyor

function loadData() {
  try {
    const raw = localStorage.getItem('zk_stats_' + TODAY);
    if (raw) todayStats = JSON.parse(raw);
  } catch(e) { todayStats = {}; }
  try {
    const cur = localStorage.getItem('zk_current');
    if (cur) {
      const d = JSON.parse(cur);
      if (d.date === TODAY) { currentZikir = d.zi || 0; count = d.count || 0; }
    }
  } catch(e) {}
  try {
    const g = localStorage.getItem('zk_goals');
    if (g) goals = JSON.parse(g);
  } catch(e) { goals = {}; }
}

function saveData() {
  localStorage.setItem('zk_stats_' + TODAY, JSON.stringify(todayStats));
  localStorage.setItem('zk_current', JSON.stringify({ date: TODAY, zi: currentZikir, count }));
}

function saveGoals() {
  localStorage.setItem('zk_goals', JSON.stringify(goals));
}

function buildSelector() {
  const wrap = document.getElementById('zikirSelector');
  wrap.innerHTML = '';
  ZIKIRLER.forEach((z, i) => {
    const b = document.createElement('button');
    b.className = 'zikir-btn' + (i === currentZikir ? ' active' : '');
    b.textContent = z.tr;
    b.onclick = () => selectZikir(i);
    wrap.appendChild(b);
  });
}

function selectZikir(i) {
  currentZikir = i;
  count = 0;
  buildSelector();
  updateUI();
  saveData();
}

function updateUI() {
  const z = ZIKIRLER[currentZikir];
  document.getElementById('zikirAr').textContent = z.ar;
  document.getElementById('zikirMeaning').textContent = z.meaning;
  document.getElementById('btnCount').textContent = count;
}

function doZikir() {
  count++;
  todayStats[currentZikir] = (todayStats[currentZikir] || 0) + 1;
  if (count % 100 === 0) triggerMasallah();
  // hedef tamamlandığında kutlama
  const goal = goals[currentZikir];
  if (goal && todayStats[currentZikir] === goal) triggerMasallah();
  updateUI();
  saveData();
}

function resetCount() {
  count = 0;
  updateUI();
  saveData();
}

function triggerMasallah() {
  const ov = document.getElementById('masallahOverlay');
  const stars = document.getElementById('masallahStars');
  stars.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = (5 + Math.random() * 90) + '%';
    s.style.top  = (5 + Math.random() * 90) + '%';
    s.style.setProperty('--dx', ((Math.random() - 0.5) * 220) + 'px');
    s.style.setProperty('--dy', ((Math.random() - 0.5) * 220) + 'px');
    s.style.animationDelay = (Math.random() * 0.35) + 's';
    stars.appendChild(s);
  }
  ov.classList.remove('boom');
  void ov.offsetWidth;
  ov.classList.add('boom');
  setTimeout(() => ov.classList.remove('boom'), 2000);
  if (navigator.vibrate) navigator.vibrate([80, 40, 120]);
}

/* ── İstatistik paneli ── */
function openStats() {
  document.getElementById('statsOverlay').classList.add('open');
  renderStats();
}

function renderStats() {
  document.getElementById('statsDate').textContent =
    new Date().toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  let total = 0;
  const container = document.getElementById('statsRows');
  container.innerHTML = '';

  ZIKIRLER.forEach((z, i) => {
    const c = todayStats[i] || 0;
    total += c;
    const goal = goals[i];
    const pct  = goal ? Math.min(100, Math.round((c / goal) * 100)) : null;
    const done = goal && c >= goal;

    const row = document.createElement('div');
    row.className = 'stats-row';

    // Sol: zikir adı + anlam
    const left = document.createElement('div');
    left.innerHTML = `
      <div class="stats-zikir" style="${done ? 'color:var(--gold)' : ''}">${z.ar}${done ? ' ✓' : ''}</div>
      <div class="stats-meaning-small">${z.tr} — ${z.meaning}</div>
    `;

    // Sağ: sayaç + hedef butonu
    const right = document.createElement('div');
    right.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:5px;';
    right.innerHTML = `
      <div class="stats-count-badge" style="${done ? 'border-color:var(--gold);background:linear-gradient(135deg,#1a6b4a,#c9a84c33)' : ''}">${c}${goal ? '<span style="font-size:0.7em;opacity:0.6"> / ' + goal + '</span>' : ''}</div>
      <button class="goal-edit-btn" onclick="openGoalModal(${i})">🎯 ${goal ? 'Hedefi Düzenle' : 'Hedef Koy'}</button>
    `;

    row.appendChild(left);
    row.appendChild(right);

    // İlerleme çubuğu
    if (goal) {
      const goalArea = document.createElement('div');
      goalArea.className = 'goal-area';
      goalArea.innerHTML = `
        <div class="goal-progress-bar">
          <div class="goal-progress-fill" style="width:${pct}%;${done ? 'background:linear-gradient(90deg,var(--emerald),var(--gold))' : ''}"></div>
        </div>
        <span class="goal-pct">${pct}%</span>
      `;
      row.appendChild(goalArea);
    }

    container.appendChild(row);
  });

  document.getElementById('statsTotal').textContent = total;
}

function closeStats() { document.getElementById('statsOverlay').classList.remove('open'); }
function closeOutside(e) { if (e.target === document.getElementById('statsOverlay')) closeStats(); }

/* ── Hedef Modal ── */
function openGoalModal(index) {
  goalEditIndex = index;
  const z = ZIKIRLER[index];
  document.getElementById('goalModalZikirName').textContent = z.tr + ' — ' + z.ar;
  const input = document.getElementById('goalInput');
  input.value = goals[index] || '';
  const clearBtn = document.getElementById('goalClearBtn');
  clearBtn.style.display = goals[index] ? 'block' : 'none';
  document.getElementById('goalModalOverlay').classList.add('open');
  setTimeout(() => input.focus(), 300);
}

function closeGoalModal() {
  document.getElementById('goalModalOverlay').classList.remove('open');
  goalEditIndex = -1;
}

function closeGoalOutside(e) {
  if (e.target === document.getElementById('goalModalOverlay')) closeGoalModal();
}

function saveGoal() {
  const val = parseInt(document.getElementById('goalInput').value);
  if (!val || val < 1) { closeGoalModal(); return; }
  goals[goalEditIndex] = val;
  saveGoals();
  closeGoalModal();
  renderStats();
}

function clearGoal() {
  delete goals[goalEditIndex];
  saveGoals();
  closeGoalModal();
  renderStats();
}

// Enter tuşuyla kaydet
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('goalModalOverlay').classList.contains('open')) {
    saveGoal();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('goalModalOverlay').classList.contains('open')) closeGoalModal();
    else closeStats();
  }
});

loadData();

// URL parametresi ile zikir seçimi (manifest shortcuts)
const urlParams = new URLSearchParams(window.location.search);
const zikirParam = urlParams.get('zikir');
if (zikirParam !== null) {
  const zi = parseInt(zikirParam);
  if (zi >= 0 && zi < ZIKIRLER.length) { currentZikir = zi; count = 0; }
}

buildSelector();
updateUI();

// ── Servis Worker Kaydı (inline) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('data:text/javascript;base64,CmNvbnN0IENBQ0hFX05BTUUgPSAnemlraXJtYXRpay12MSc7CnNlbGYuYWRkRXZlbnRMaXN0ZW5lcignaW5zdGFsbCcsIGUgPT4gewogIHNlbGYuc2tpcFdhaXRpbmcoKTsKfSk7CnNlbGYuYWRkRXZlbnRMaXN0ZW5lcignYWN0aXZhdGUnLCBlID0+IHsKICBzZWxmLmNsaWVudHMuY2xhaW0oKTsKfSk7CnNlbGYuYWRkRXZlbnRMaXN0ZW5lcignZmV0Y2gnLCBlID0+IHsKICBlLnJlc3BvbmRXaXRoKAogICAgY2FjaGVzLm1hdGNoKGUucmVxdWVzdCkudGhlbihjYWNoZWQgPT4gewogICAgICBpZiAoY2FjaGVkKSByZXR1cm4gY2FjaGVkOwogICAgICByZXR1cm4gZmV0Y2goZS5yZXF1ZXN0KS50aGVuKHJlc3AgPT4gewogICAgICAgIGlmIChyZXNwICYmIHJlc3Auc3RhdHVzID09PSAyMDApIHsKICAgICAgICAgIGNvbnN0IGNsb25lID0gcmVzcC5jbG9uZSgpOwogICAgICAgICAgY2FjaGVzLm9wZW4oQ0FDSEVfTkFNRSkudGhlbihjID0+IGMucHV0KGUucmVxdWVzdCwgY2xvbmUpKTsKICAgICAgICB9CiAgICAgICAgcmV0dXJuIHJlc3A7CiAgICAgIH0pLmNhdGNoKCgpID0+IGNhY2hlcy5tYXRjaCgnLi8nKSk7CiAgICB9KQogICk7Cn0pOwo=', {type: 'classic'})
      .then(reg => console.log('SW kayıtlı'))
      .catch(err => {
        // Bazı tarayıcılar data URI SW'yi desteklemez, sorun yok
        console.log('SW inline desteklenmiyor, offline çalışmayabilir');
      });
  });
}
</script>
</body>
